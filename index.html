<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/LoL-Guide-/">
    <title>英雄联盟学习站 - LOL Champions Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-gamepad"></i>
                <span>LOL学习站</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active"><i class="fas fa-home"></i> 首页</a>
                <a href="guide.html" class="nav-link"><i class="fas fa-book"></i> 游戏攻略</a>
                <a href="#" class="nav-link" id="nav-favorites"><i class="fas fa-heart"></i> 收藏夹 <span class="badge" id="fav-count">0</span></a>
                <a href="#" class="nav-link" id="nav-compare"><i class="fas fa-exchange-alt"></i> 英雄对比</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- 移动端菜单 -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" class="mobile-link active"><i class="fas fa-home"></i> 首页</a>
        <a href="guide.html" class="mobile-link"><i class="fas fa-book"></i> 游戏攻略</a>
        <a href="#" class="mobile-link" id="mobile-favorites"><i class="fas fa-heart"></i> 收藏夹</a>
        <a href="#" class="mobile-link" id="mobile-compare"><i class="fas fa-exchange-alt"></i> 英雄对比</a>
    </div>

    <!-- 主横幅 -->
    <header class="hero">
        <div class="hero-content">
            <h1>英雄联盟学习站</h1>
            <p>掌握每一个英雄，成为召唤师峡谷的王者</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="total-champions">172</span>
                    <span class="stat-label">英雄总数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">6</span>
                    <span class="stat-label">职业分类</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">15.15</span>
                    <span class="stat-label">当前版本</span>
                </div>
            </div>
        </div>
        <div class="hero-overlay"></div>
    </header>

    <!-- 搜索和筛选区域 -->
    <section class="filter-section">
        <div class="container">
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索英雄名称或称号...">
                    <button class="clear-btn" id="clear-search"><i class="fas fa-times"></i></button>
                </div>
                <div class="filter-tags">
                    <button class="filter-tag active" data-tag="all">全部</button>
                    <button class="filter-tag" data-tag="Fighter"><i class="fas fa-fist-raised"></i> 战士</button>
                    <button class="filter-tag" data-tag="Mage"><i class="fas fa-hat-wizard"></i> 法师</button>
                    <button class="filter-tag" data-tag="Assassin"><i class="fas fa-crosshairs"></i> 刺客</button>
                    <button class="filter-tag" data-tag="Marksman"><i class="fas fa-bullseye"></i> 射手</button>
                    <button class="filter-tag" data-tag="Tank"><i class="fas fa-shield-alt"></i> 坦克</button>
                    <button class="filter-tag" data-tag="Support"><i class="fas fa-hands-helping"></i> 辅助</button>
                </div>
                <div class="sort-options">
                    <label>排序：</label>
                    <select id="sort-select">
                        <option value="name-asc">名称 A-Z</option>
                        <option value="name-desc">名称 Z-A</option>
                        <option value="attack-desc">攻击力 ↓</option>
                        <option value="magic-desc">法术 ↓</option>
                        <option value="defense-desc">防御 ↓</option>
                        <option value="difficulty-desc">难度 ↓</option>
                    </select>
                </div>
            </div>
            <div class="filter-info">
                <span id="result-count">显示 172 个英雄</span>
            </div>
        </div>
    </section>

    <!-- 英雄列表 -->
    <main class="champions-section">
        <div class="container">
            <div class="champions-grid" id="champions-grid">
                <!-- 英雄卡片由 JS 动态生成 -->
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在加载英雄数据...</p>
            </div>
            <div class="no-results" id="no-results" style="display:none;">
                <i class="fas fa-search"></i>
                <p>没有找到匹配的英雄</p>
            </div>
        </div>
    </main>

    <!-- 收藏夹弹窗 -->
    <div class="modal" id="favorites-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-heart"></i> 我的收藏</h2>
                <button class="modal-close" id="close-favorites"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="favorites-list">
                <p class="empty-msg">还没有收藏任何英雄</p>
            </div>
        </div>
    </div>

    <!-- 对比弹窗 -->
    <div class="modal" id="compare-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2><i class="fas fa-exchange-alt"></i> 英雄对比</h2>
                <button class="modal-close" id="close-compare"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="compare-content">
                <p class="empty-msg">请在英雄卡片上点击对比按钮选择英雄（最多3个）</p>
            </div>
        </div>
    </div>

    <!-- 英雄详情弹窗 -->
    <div class="modal" id="detail-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="detail-title"></h2>
                <button class="modal-close" id="close-detail"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="detail-content">
                <!-- 详情内容由 JS 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <p class="footer-brand"><i class="fas fa-gamepad"></i> LOL学习站</p>
                    <p class="footer-credit">Created with <i class="fas fa-heart" style="color:#e74c3c"></i> by <strong>粥粥</strong></p>
                </div>
                <div class="footer-links">
                    <p>英雄数据来源于 Riot Games Data Dragon API</p>
                    <p>League of Legends © Riot Games, Inc.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
